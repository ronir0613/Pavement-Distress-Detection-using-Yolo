services:
  backend:
    build:
      context: ./pavement-distress-detection/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./pavement-distress-detection/backend/models:/app/models
      - ./pavement-distress-detection/backend/uploads:/app/uploads
      - ./pavement-distress-detection/backend/predictions:/app/predictions
    environment:
      - CORS_ORIGINS=http://localhost
    restart: unless-stopped

  frontend:
    build:
      context: ./pavement-distress-detection/frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
